<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180.png" />
    <meta name="theme-color" content="#6D28D9" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ciaren</title>
    <script>
      // Apply the persisted (or system) theme before first paint so there's
      // no flash of the wrong theme while React boots. Mirrors themeStore.ts.
      (function () {
        try {
          var stored = localStorage.getItem("ciaren-theme");
          var theme = stored ? JSON.parse(stored).state.theme : null;
          var dark = theme
            ? theme === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {
          /* ignore — falls back to light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
