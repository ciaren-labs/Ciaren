name: DCO

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sign-off-check:
    name: Check commits are signed off
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Verify every commit has a Signed-off-by trailer
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          base="$BASE"
          head="$HEAD"
          missing=0
          for commit in $(git rev-list "$base..$head"); do
            if ! git log -1 --format=%B "$commit" | grep -qi '^Signed-off-by: '; then
              echo "::error::Commit $commit is missing a 'Signed-off-by' trailer. Run: git commit --amend -s (or git rebase --signoff)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more commits are not signed off. See CONTRIBUTING.md#developer-certificate-of-origin-dco."
            exit 1
          fi
          echo "All commits are signed off."
