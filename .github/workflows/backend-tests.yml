name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/backend-tests.yml
  pull_request:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/backend-tests.yml

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} | DB ${{ matrix.database }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        database: [sqlite, postgresql]
        exclude:
          # PostgreSQL is heavy, only test on one Python version to save CI time
          # Remove this if you want full matrix coverage
          - python-version: "3.12"
            database: postgresql
          - python-version: "3.13"
            database: postgresql

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowframe_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
        # Only start PostgreSQL service when needed
        if: matrix.database == 'postgresql'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: latest

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: uv

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-groups

      - name: Lint with Ruff
        working-directory: backend
        run: uv run ruff check app tests --exclude migrations

      - name: Type check with mypy
        working-directory: backend
        run: uv run mypy app

      - name: Set database URL (SQLite)
        if: matrix.database == 'sqlite'
        run: echo "DATABASE_URL=sqlite:///./test.db" >> $GITHUB_ENV

      - name: Set database URL (PostgreSQL)
        if: matrix.database == 'postgresql'
        run: echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/flowframe_test" >> $GITHUB_ENV

      - name: Run tests with coverage
        working-directory: backend
        run: uv run pytest tests --cov=app --cov-report=term-out --cov-report=xml --cov-fail-under=95
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend-py${{ matrix.python-version }}-${{ matrix.database }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && matrix.python-version == '3.11' && matrix.database == 'sqlite'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 95
          MINIMUM_ORANGE: 85

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "❌ Backend tests failed"
            exit 1
          else
            echo "✅ All backend tests passed"
          fi
