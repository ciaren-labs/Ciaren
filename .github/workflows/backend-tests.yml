name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/backend-tests.yml
  pull_request:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/backend-tests.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Resolve matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo 'matrix={"os":["ubuntu-latest","windows-latest","macos-latest"],"python-version":["3.12","3.13"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"os":["ubuntu-latest"],"python-version":["3.12"]}' >> $GITHUB_OUTPUT
          fi

  test:
    name: Test | ${{ matrix.os }} · Python ${{ matrix.python-version }}
    needs: setup
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # xgboost / lightgbm load the OpenMP runtime at import time; macOS runners
      # don't ship it, so the ml test suite fails without it.
      - name: Install OpenMP runtime (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Install dependencies
        working-directory: backend
        # The ml extra (scikit-learn, xgboost, lightgbm, mlflow) is required for the
        # ML test suite; without it those tests error with ModuleNotFoundError. The
        # connector/storage extras are intentionally not installed here: several tests
        # assert the "driver missing" path, and the cloud connectors have no
        # infra-free tests, so installing them breaks tests without raising coverage.
        run: uv sync --all-groups --extra ml

      - name: Lint with Ruff
        working-directory: backend
        run: uv run ruff check app tests

      - name: Type check with mypy
        working-directory: backend
        run: uv run mypy app

      # The test suite runs against in-memory SQLite (see tests/conftest.py),
      # so no external database service is needed here.
      - name: Run tests with coverage
        working-directory: backend
        # This job runs the infra-free suite only (the cloud/SQL connector
        # integration tests self-skip here and run in the connectors-integration
        # workflow). That suite measures ~88%, so the gate is 87% — a ~1pt buffer
        # for cross-platform/Python fluctuation. The connector I/O paths are gated
        # separately on the *merged* Codecov report (see codecov.yml).
        run: uv run pytest tests --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=87

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./backend/coverage.xml
          flags: backend-${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          echo "✅ All backend tests passed"
