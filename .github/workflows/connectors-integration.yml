name: Connectors Integration

# Exercises the real I/O paths of the data-source connectors against ephemeral
# containers (MinIO for S3, MongoDB, Azurite for Azure Blob, fake-gcs-server for
# GCS). The default Backend Tests suite stays infra-free; these tests self-skip
# there and run only here, where the service endpoints are provided via env vars.
# Linux-only — the goal is to cover the connector code paths, not the OS matrix.

on:
  push:
    branches: [main]
    paths:
      # Scope to connector code + its integration tests (and the extras that
      # provide the drivers), so unrelated backend changes (e.g. plugins) don't
      # trigger this heavy container suite.
      - backend/app/connectors/**
      - backend/tests/integration/**
      - backend/pyproject.toml
      - .github/workflows/connectors-integration.yml
  pull_request:
    # Connectors CI only gates main — it's too heavy to run on every feature PR.
    branches: [main]
    paths:
      # Scope to connector code + its integration tests (and the extras that
      # provide the drivers), so unrelated backend changes (e.g. plugins) don't
      # trigger this heavy container suite.
      - backend/app/connectors/**
      - backend/tests/integration/**
      - backend/pyproject.toml
      - .github/workflows/connectors-integration.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  s3:
    name: S3 connector (MinIO)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Consumed by tests/integration/test_s3_connector.py (it self-skips without these).
      CIAREN_TEST_S3_ENDPOINT: http://127.0.0.1:9000
      CIAREN_TEST_S3_ACCESS_KEY: minioadmin
      CIAREN_TEST_S3_SECRET_KEY: minioadmin
      CIAREN_TEST_S3_REGION: us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # MinIO needs the `server /data` argument, which GitHub `services:` cannot
      # supply (service containers run the image's default entrypoint only), so
      # start it as a plain container instead.
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER="$MINIO_ROOT_USER" \
            -e MINIO_ROOT_PASSWORD="$MINIO_ROOT_PASSWORD" \
            minio/minio:latest server /data

      - name: Wait for MinIO to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:9000/minio/health/ready; then
              echo "MinIO ready"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO did not become ready in time"
          docker logs minio || true
          exit 1

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install dependencies
        working-directory: backend
        # dev group (pytest/cov/asyncio/httpx) + the s3 extra (boto3).
        run: uv sync --all-groups --extra s3

      - name: Run connector integration tests
        working-directory: backend
        # Only the `connectors`-marked tests; no --cov-fail-under here since this
        # subset can't reach the project gate on its own. Coverage is uploaded
        # under a distinct flag so Codecov merges it with the main suite's report.
        run: >-
          uv run pytest tests -m connectors
          --cov=app/connectors --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./backend/coverage.xml
          flags: connectors-integration
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Stop MinIO
        if: always()
        run: docker rm -f minio || true

  mongo:
    name: Mongo connector (MongoDB)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # The official mongo image runs mongod under its default entrypoint, so it
    # works as a service container (no command override needed, unlike MinIO).
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      # Consumed by tests/integration/test_mongo_connector.py (it self-skips without these).
      CIAREN_TEST_MONGO_HOST: 127.0.0.1
      CIAREN_TEST_MONGO_PORT: "27017"

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install dependencies
        working-directory: backend
        # dev group (pytest/cov/asyncio/httpx) + the mongo extra (pymongo).
        run: uv sync --all-groups --extra mongo

      # Service containers report "started" before mongod finishes initializing;
      # poll with the same driver the tests use rather than a brittle health-cmd.
      - name: Wait for MongoDB to be ready
        working-directory: backend
        run: |
          for i in $(seq 1 30); do
            if uv run python -c "from pymongo import MongoClient; MongoClient('127.0.0.1', 27017, serverSelectionTimeoutMS=1500).admin.command('ping')"; then
              echo "MongoDB ready"
              exit 0
            fi
            sleep 2
          done
          echo "MongoDB did not become ready in time"
          exit 1

      - name: Run connector integration tests
        working-directory: backend
        # Mirrors the s3 job: only `connectors`-marked tests, no --cov-fail-under,
        # coverage uploaded under the shared flag so Codecov merges both jobs.
        run: >-
          uv run pytest tests -m connectors
          --cov=app/connectors --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./backend/coverage.xml
          flags: connectors-integration
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  azure:
    name: Azure Blob connector (Azurite)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Consumed by tests/integration/test_azure_connector.py (it self-skips without this).
      CIAREN_TEST_AZURE_ENDPOINT: http://127.0.0.1:10000/devstoreaccount1

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Azurite needs --skipApiVersionCheck (the SDK speaks a newer API version
      # than the emulator pins) and --blobHost 0.0.0.0 to be reachable through the
      # port mapping; GitHub `services:` can't pass those, so run it directly.
      - name: Start Azurite
        run: |
          docker run -d --name azurite -p 10000:10000 \
            mcr.microsoft.com/azure-storage/azurite \
            azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck

      - name: Wait for Azurite to be ready
        run: |
          for i in $(seq 1 30); do
            # Any HTTP response (403 auth challenge included) means it's listening;
            # only a refused connection yields curl's 000.
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:10000/devstoreaccount1?comp=list" || true)
            if [ -n "$code" ] && [ "$code" != "000" ]; then
              echo "Azurite ready ($code)"
              exit 0
            fi
            sleep 1
          done
          echo "Azurite did not become ready in time"
          docker logs azurite || true
          exit 1

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-groups --extra azure

      - name: Run connector integration tests
        working-directory: backend
        run: >-
          uv run pytest tests -m connectors
          --cov=app/connectors --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./backend/coverage.xml
          flags: connectors-integration
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Stop Azurite
        if: always()
        run: docker rm -f azurite || true

  gcs:
    name: GCS connector (fake-gcs-server)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # The google-cloud-storage client honours STORAGE_EMULATOR_HOST (anonymous
      # creds); the connector and tests both rely on it being set.
      STORAGE_EMULATOR_HOST: http://127.0.0.1:4443
      CIAREN_TEST_GCS_PROJECT: test-project

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # fake-gcs-server needs -scheme http to serve plain HTTP; GitHub `services:`
      # can't pass that argument, so run it directly.
      - name: Start fake-gcs-server
        run: |
          docker run -d --name fake-gcs -p 4443:4443 \
            fsouza/fake-gcs-server -scheme http -port 4443 -public-host 127.0.0.1:4443

      - name: Wait for fake-gcs-server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4443/storage/v1/b >/dev/null; then
              echo "fake-gcs-server ready"
              exit 0
            fi
            sleep 1
          done
          echo "fake-gcs-server did not become ready in time"
          docker logs fake-gcs || true
          exit 1

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-groups --extra gcs

      - name: Run connector integration tests
        working-directory: backend
        run: >-
          uv run pytest tests -m connectors
          --cov=app/connectors --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./backend/coverage.xml
          flags: connectors-integration
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Stop fake-gcs-server
        if: always()
        run: docker rm -f fake-gcs || true

  summary:
    name: Connectors Integration Summary
    runs-on: ubuntu-latest
    needs: [s3, mongo, azure, gcs]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.s3.result }}" != "success" ] \
            || [ "${{ needs.mongo.result }}" != "success" ] \
            || [ "${{ needs.azure.result }}" != "success" ] \
            || [ "${{ needs.gcs.result }}" != "success" ]; then
            echo "❌ One or more connector integration suites failed"
            exit 1
          fi
          echo "✅ All connector integration suites passed"
