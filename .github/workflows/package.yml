name: Package & Publish (PyPI)

# Builds distributable wheels for both PyPI packages that live in this repo:
#   - ciaren        (backend/) — the server. The frontend is built and bundled
#                     into it (app/web) by the hatch build hook, so `pip install`
#                     + `ciaren serve` ships and serves the web UI with no Node
#                     on the user's machine.
#   - ciaren-client (client/) — the thin httpx-based SDK.
#
# The two packages are versioned in lockstep: pushing a single version tag
# (e.g. "0.1.0", or a pre-release like "0.1.0-alpha.1", "0.1.0-beta.2",
# "0.1.0-rc.1") builds and publishes both packages at that version. Each build
# job verifies its own package's pyproject.toml against the tag independently,
# so bumping only one of the two before tagging fails that job before anything
# is published. hatchling normalizes these to PEP 440 at build time (e.g.
# "0.1.0-alpha.1" -> "0.1.0a1"), and PyPI/pip already treat any pre-release
# identifier as non-final: `pip install ciaren` skips them unless run with
# `--pre` or an exact version pin.

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-server:
    name: Build server wheel (ciaren)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: backend
        env:
          GIT_TAG: ${{ github.ref_name }}
        # Compares normalized (PEP 440) versions, not raw strings, so a tag like
        # "0.1.0-alpha.1" matches a pyproject.toml version of either "0.1.0-alpha.1"
        # or the canonical "0.1.0a1" — same for -beta./-rc. pre-releases.
        run: |
          python -m pip install -q packaging
          python - <<'PY'
          import os
          import sys
          import tomllib

          from packaging.version import InvalidVersion, Version

          tag = os.environ["GIT_TAG"]
          version = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]
          try:
              tag_version, pkg_version = Version(tag), Version(version)
          except InvalidVersion as exc:
              print(f"❌ {exc}")
              sys.exit(1)

          if tag_version != pkg_version:
              print(f"❌ Tag ({tag} -> {tag_version}) does not match pyproject.toml version ({version} -> {pkg_version})")
              sys.exit(1)

          print(f"✅ Tag matches package version: {version} (normalized: {tag_version})")
          PY

      - name: Build wheel + sdist
        working-directory: backend
        # Built as two separate invocations, not the combined `python -m build`.
        # By default that builds the wheel *from the just-created sdist* in an
        # isolated copy that only contains backend/ — the hatch hooks that pull
        # in ../frontend/dist and ../README.md then can't see either, silently
        # shipping an API-only, description-less wheel. Building each target
        # straight from the source tree keeps both hooks working.
        run: |
          python -m pip install build
          python -m build --sdist
          python -m build --wheel

      - name: Verify the UI is bundled in the wheel
        working-directory: backend
        run: |
          python - <<'PY'
          import glob, sys, zipfile
          wheel = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(wheel).namelist()
          assert any(n.endswith("app/web/index.html") for n in names), "index.html missing from wheel"
          assert any("app/web/assets/" in n and n.endswith(".js") for n in names), "JS bundle missing from wheel"
          print(f"OK: {wheel} bundles the web UI")
          PY

      - name: Upload wheel + sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ciaren-dist
          path: backend/dist/*
          retention-days: 30

  build-client:
    name: Build client wheel (ciaren-client)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: client
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          python -m pip install -q packaging
          python - <<'PY'
          import os
          import sys
          import tomllib

          from packaging.version import InvalidVersion, Version

          tag = os.environ["GIT_TAG"]
          version = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]
          try:
              tag_version, pkg_version = Version(tag), Version(version)
          except InvalidVersion as exc:
              print(f"❌ {exc}")
              sys.exit(1)

          if tag_version != pkg_version:
              print(f"❌ Tag ({tag} -> {tag_version}) does not match pyproject.toml version ({version} -> {pkg_version})")
              sys.exit(1)

          print(f"✅ Tag matches package version: {version} (normalized: {tag_version})")
          PY

      - name: Build wheel + sdist
        working-directory: client
        run: |
          python -m pip install build
          python -m build --sdist
          python -m build --wheel

      - name: Upload wheel + sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ciaren-client-dist
          path: client/dist/*
          retention-days: 30

  publish-server:
    name: Publish ciaren to PyPI
    # Needs both builds, not just its own — the two packages are versioned in
    # lockstep, so if build-client fails its tag-vs-version check, this job
    # must not publish either (otherwise ciaren ships while ciaren-client
    # doesn't, breaking the lockstep guarantee).
    needs: [build-server, build-client]
    # Only publish on an actual version tag push (not workflow_dispatch), so
    # maintainers can still use workflow_dispatch to sanity-check the build.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/ciaren/
    permissions:
      # Required for PyPI trusted publishing (OIDC) — no API token needed.
      id-token: write

    steps:
      - name: Download wheel + sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ciaren-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: dist

  publish-client:
    name: Publish ciaren-client to PyPI
    # Needs both builds — see the note on publish-server above.
    needs: [build-server, build-client]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      # Separate environment from `pypi` because PyPI trusted publishing is
      # registered per (repo, workflow, environment) -> one PyPI project. This
      # env name must have its own trusted-publisher entry configured on the
      # ciaren-client PyPI project before this job can succeed.
      name: pypi-client
      url: https://pypi.org/project/ciaren-client/
    permissions:
      id-token: write

    steps:
      - name: Download wheel + sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ciaren-client-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: dist
