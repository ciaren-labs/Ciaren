name: Package & Publish (PyPI)

# Builds the distributable wheel: the frontend is built and bundled into the
# package (app/web) by the hatch build hook, so `pip install` + `ciaren serve`
# ships and serves the web UI with no Node on the user's machine.
#
# Pushing a version tag (e.g. "0.1.0", matching pyproject.toml's version)
# additionally publishes the build to PyPI via trusted publishing (OIDC) —
# no long-lived API token stored in the repo.

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build wheel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: backend
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$VERSION" ]; then
            echo "❌ Tag ($TAG) does not match pyproject.toml version ($VERSION)"
            exit 1
          fi
          echo "✅ Tag matches package version: $VERSION"

      - name: Build wheel + sdist
        working-directory: backend
        # Built as two separate invocations, not the combined `python -m build`.
        # By default that builds the wheel *from the just-created sdist* in an
        # isolated copy that only contains backend/ — the hatch hooks that pull
        # in ../frontend/dist and ../README.md then can't see either, silently
        # shipping an API-only, description-less wheel. Building each target
        # straight from the source tree keeps both hooks working.
        run: |
          python -m pip install build
          python -m build --sdist
          python -m build --wheel

      - name: Verify the UI is bundled in the wheel
        working-directory: backend
        run: |
          python - <<'PY'
          import glob, sys, zipfile
          wheel = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(wheel).namelist()
          assert any(n.endswith("app/web/index.html") for n in names), "index.html missing from wheel"
          assert any("app/web/assets/" in n and n.endswith(".js") for n in names), "JS bundle missing from wheel"
          print(f"OK: {wheel} bundles the web UI")
          PY

      - name: Upload wheel + sdist
        uses: actions/upload-artifact@v7
        with:
          name: ciaren-dist
          path: backend/dist/*
          retention-days: 30

  publish:
    name: Publish to PyPI
    needs: build
    # Only publish on an actual version tag push (not workflow_dispatch), so
    # maintainers can still use workflow_dispatch to sanity-check the build.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/ciaren/
    permissions:
      # Required for PyPI trusted publishing (OIDC) — no API token needed.
      id-token: write

    steps:
      - name: Download wheel + sdist
        uses: actions/download-artifact@v8
        with:
          name: ciaren-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
