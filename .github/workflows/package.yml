name: Package (wheel with bundled UI)

# Builds the distributable wheel: the frontend is built and bundled into the
# package (app/web) by the hatch build hook, so `pip install` + `ciaren serve`
# ships and serves the web UI with no Node on the user's machine.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build wheel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        working-directory: backend
        run: |
          python -m pip install build
          python -m build

      - name: Verify the UI is bundled in the wheel
        working-directory: backend
        run: |
          python - <<'PY'
          import glob, sys, zipfile
          wheel = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(wheel).namelist()
          assert any(n.endswith("app/web/index.html") for n in names), "index.html missing from wheel"
          assert any("app/web/assets/" in n and n.endswith(".js") for n in names), "JS bundle missing from wheel"
          print(f"OK: {wheel} bundles the web UI")
          PY

      - name: Upload wheel + sdist
        uses: actions/upload-artifact@v7
        with:
          name: ciaren-dist
          path: backend/dist/*
          retention-days: 30
