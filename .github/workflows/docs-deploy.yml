name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/docs-deploy.yml
  pull_request:
    # Lint + build runs for PRs to both branches; deploy job is gated to push on main below.
    branches: [main, development]
    paths:
      - docs/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel superseded PR runs per ref; never cancel a push (main) run mid-flight.
# Pages deployments are serialized separately on the deploy job below.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Lint markdown
        working-directory: docs
        run: npm run lint

  test:
    name: Test Documentation Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build documentation
        working-directory: docs
        run: npm run build

      - name: Validate build output
        working-directory: docs
        run: npm run test:build

      - name: Check for broken links
        working-directory: docs
        run: npm run test:links

      - name: Check build size
        run: |
          SIZE=$(du -sh docs/.vitepress/dist | cut -f1)
          echo "📦 Build size: $SIZE"

          FILES=$(find docs/.vitepress/dist -type f | wc -l)
          echo "📄 Total files: $FILES"

          if [ "$FILES" -lt 50 ]; then
            echo "❌ Fewer files than expected"
            exit 1
          fi

  build:
    name: Build & Deploy Docs
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        env:
          VITEPRESS_GA_ID: ${{ vars.VITEPRESS_GA_ID }}
        run: npm run build

      - name: Verify build artifacts
        run: |
          echo "🔍 Checking build artifacts..."
          [ -d "docs/.vitepress/dist" ] || (echo "❌ dist not found" && exit 1)
          [ -f "docs/.vitepress/dist/index.html" ] || (echo "❌ index.html not found" && exit 1)
          echo "✅ Build artifacts verified"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    # Only deploy from main, and only when Pages can actually be deployed: on a
    # private repo (no paid plan / Pages not enabled) the deploy step fails with
    # "404 — Ensure GitHub Pages has been enabled". Gating on public visibility
    # keeps CI green and starts deploying automatically once the repo is public
    # and Pages source is set to GitHub Actions.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.repository.visibility == 'public'
    needs: build
    runs-on: ubuntu-latest
    # Serialize Pages deployments across the whole repo, but never cancel a
    # deployment that is already running (GitHub Pages guidance).
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          echo "✅ Documentation deployed successfully!"
          echo ""
          echo "📖 Published at:"
          echo "   ${{ steps.deployment.outputs.page_url }}"

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()

    steps:
      - name: Test Results
        run: |
          echo "📊 Docs Test Results"
          echo "===================="
          echo ""
          echo "Linting:     ${{ needs.lint.result == 'success' && '✅ PASS' || '❌ FAIL' }}"
          echo "Tests:       ${{ needs.test.result == 'success' && '✅ PASS' || '❌ FAIL' }}"
          echo "Build:       ${{ needs.build.result == 'success' && '✅ PASS' || '❌ FAIL' }}"
          echo ""

          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Documentation pipeline failed"
            exit 1
          fi

          echo "✅ All documentation checks passed"
