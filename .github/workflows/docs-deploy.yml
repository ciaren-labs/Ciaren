name: Deploy Documentation

on:
  push:
    branches: [main]
    # Stable release tags (not pre-releases like "-alpha.1") get a permanent
    # docs snapshot at /v/<tag>/, built alongside the root site in the build
    # job below. GitHub does not evaluate `paths` for tag pushes, so a stable
    # tag always triggers this workflow regardless of whether that commit
    # touched docs/ — see https://github.com/orgs/community/discussions/165354.
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
    paths:
      - docs/**
      - .github/workflows/docs-deploy.yml
  pull_request:
    # Lint + build runs for PRs to both branches; deploy job is gated to push on main below.
    branches: [main, development]
    paths:
      - docs/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel superseded PR runs per ref; never cancel a push (main) run mid-flight.
# Pages deployments are serialized separately on the deploy job below.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Lint markdown
        working-directory: docs
        run: npm run lint

  test:
    name: Test Documentation Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build documentation
        working-directory: docs
        run: npm run build

      - name: Validate build output
        working-directory: docs
        run: npm run test:build

      - name: Check for broken links
        working-directory: docs
        run: npm run test:links

      - name: Check build size
        run: |
          SIZE=$(du -sh docs/.vitepress/dist | cut -f1)
          echo "📦 Build size: $SIZE"

          FILES=$(find docs/.vitepress/dist -type f | wc -l)
          echo "📄 Total files: $FILES"

          if [ "$FILES" -lt 50 ]; then
            echo "❌ Fewer files than expected"
            exit 1
          fi

  build:
    name: Build & Deploy Docs
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Determine stable versions
        id: versions
        # Stable = plain X.Y.Z tags only (excludes -alpha./-beta./-rc. tags
        # used by package.yml). Each of these gets a permanent /v/<tag>/
        # snapshot below, rebuilt from that tag's own docs/ source.
        run: |
          STABLE_TAGS=$(git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tr '\n' ' ')
          VERSIONS_JSON=$(printf '%s\n' $STABLE_TAGS | jq -R . | jq -sc '[.[] | select(length > 0)]')
          echo "tags=$STABLE_TAGS" >> "$GITHUB_OUTPUT"
          echo "json=$VERSIONS_JSON" >> "$GITHUB_OUTPUT"
          echo "Stable versions to snapshot: $STABLE_TAGS"

      - name: Build docs (root + versioned snapshots)
        env:
          VITEPRESS_GA_ID: ${{ vars.VITEPRESS_GA_ID }}
          STABLE_TAGS: ${{ steps.versions.outputs.tags }}
          VERSIONS_JSON: ${{ steps.versions.outputs.json }}
          # PR runs never deploy (the deploy job is push/tag-only, see below), so
          # rebuilding every historical version snapshot on each docs PR just
          # burns CI minutes for no observable effect. Only do the full
          # multi-tag rebuild on the events that can actually publish it.
          IS_PULL_REQUEST: ${{ github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail
          mkdir -p site

          echo "🔨 Building latest (root) from $(git rev-parse --short HEAD)"
          ( cd docs && npm ci && DOCS_BASE_PATH=/ DOCS_VERSIONS_JSON="$VERSIONS_JSON" npm run build )
          cp -r docs/.vitepress/dist/. site/

          if [ "$IS_PULL_REQUEST" = "true" ]; then
            echo "Skipping versioned snapshot rebuilds on pull_request (nothing to deploy here)."
          else
            for tag in $STABLE_TAGS; do
              echo "🔨 Building pinned snapshot for $tag"
              git worktree add --detach ".worktrees/$tag" "$tag"
              ( cd ".worktrees/$tag/docs" && npm ci && DOCS_BASE_PATH="/v/$tag/" DOCS_VERSIONS_JSON="$VERSIONS_JSON" npm run build )
              mkdir -p "site/v/$tag"
              cp -r ".worktrees/$tag/docs/.vitepress/dist/." "site/v/$tag/"
              git worktree remove ".worktrees/$tag" --force
            done
          fi

      - name: Verify build artifacts
        run: |
          echo "🔍 Checking build artifacts..."
          [ -d "site" ] || (echo "❌ site not found" && exit 1)
          [ -f "site/index.html" ] || (echo "❌ index.html not found" && exit 1)
          echo "✅ Build artifacts verified"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    # Only deploy from main or a stable release tag, and only when Pages can
    # actually be deployed: on a private repo (no paid plan / Pages not
    # enabled) the deploy step fails with "404 — Ensure GitHub Pages has been
    # enabled". Gating on public visibility keeps CI green and starts
    # deploying automatically once the repo is public and Pages source is set
    # to GitHub Actions.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && github.event.repository.visibility == 'public'
    needs: build
    runs-on: ubuntu-latest
    # Serialize Pages deployments across the whole repo, but never cancel a
    # deployment that is already running (GitHub Pages guidance).
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Deployment Summary
        run: |
          echo "✅ Documentation deployed successfully!"
          echo ""
          echo "📖 Published at:"
          echo "   ${{ steps.deployment.outputs.page_url }}"

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()

    steps:
      - name: Test Results
        run: |
          echo "📊 Docs Test Results"
          echo "===================="
          echo ""
          echo "Linting:     ${{ needs.lint.result == 'success' && '✅ PASS' || '❌ FAIL' }}"
          echo "Tests:       ${{ needs.test.result == 'success' && '✅ PASS' || '❌ FAIL' }}"
          echo "Build:       ${{ needs.build.result == 'success' && '✅ PASS' || '❌ FAIL' }}"
          echo ""

          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Documentation pipeline failed"
            exit 1
          fi

          echo "✅ All documentation checks passed"
