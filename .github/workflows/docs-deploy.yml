name: Documentation Checks

# Docs are no longer published from this repo — ciaren.com/docs is published
# elsewhere, pulled from here manually after a release. This workflow only
# lints and validates the VitePress docs/ source as a PR gate — no GitHub
# Pages deploy, no per-tag snapshot builds.
on:
  push:
    branches: [main]
    paths:
      - docs/**
  pull_request:
    branches: [main]
    paths:
      - docs/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Lint markdown
        working-directory: docs
        run: npm run lint

  test:
    name: Test Documentation Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build documentation
        working-directory: docs
        run: npm run build

      - name: Validate build output
        working-directory: docs
        run: npm run test:build

      - name: Check for broken links
        working-directory: docs
        run: npm run test:links

      - name: Check build size
        run: |
          SIZE=$(du -sh docs/.vitepress/dist | cut -f1)
          echo "📦 Build size: $SIZE"

          FILES=$(find docs/.vitepress/dist -type f | wc -l)
          echo "📄 Total files: $FILES"

          if [ "$FILES" -lt 50 ]; then
            echo "❌ Fewer files than expected"
            exit 1
          fi

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()

    steps:
      - name: Test Results
        run: |
          echo "📊 Docs Test Results"
          echo "===================="
          echo ""
          echo "Linting:     ${{ needs.lint.result == 'success' && '✅ PASS' || '❌ FAIL' }}"
          echo "Tests:       ${{ needs.test.result == 'success' && '✅ PASS' || '❌ FAIL' }}"
          echo ""

          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Documentation pipeline failed"
            exit 1
          fi

          echo "✅ All documentation checks passed"
