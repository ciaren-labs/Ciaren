name: Docker

on:
  # Base build+smoke gates PRs targeting main only. Direct pushes to main do NOT
  # build the image (the PR already validated it); a broken Dockerfile pushed
  # straight to main is caught by the weekly schedule and at release-tag time.
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - docker-compose.yml
      - backend/**
      - frontend/**
      - .github/workflows/docker.yml
  # Release tags run the full build including the heavy ML image; the weekly
  # schedule keeps the image buildable even without a change landing.
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"
  schedule:
    - cron: "37 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build & smoke-test (base)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ciaren:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify frontend is bundled in the image
        run: |
          docker run --rm --entrypoint sh ciaren:ci -c \
            '[ -f /app/app/web/index.html ] \
              && echo "✅ index.html present" \
              || (echo "❌ index.html missing from /app/app/web/" && exit 1)'

      - name: Start container
        run: |
          docker run -d \
            --name ciaren-ci \
            -p 8055:8055 \
            ciaren:ci

      - name: Wait for the health endpoint to be ready
        run: |
          echo "Waiting for Ciaren to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8055/health > /dev/null 2>&1; then
              echo "✅ Ready after $((i * 3))s"
              exit 0
            fi
            echo "  [$i/30] not ready yet..."
            sleep 3
          done
          echo "❌ Health check timed out after 90s"
          docker logs ciaren-ci
          exit 1

      - name: Verify /health response
        run: curl -sf http://localhost:8055/health

      - name: Verify core ML packages are importable
        run: |
          docker exec ciaren-ci python -c \
            "import sklearn, mlflow, joblib; print('✅ core ML packages available')"

      - name: Verify frontend is served at /
        run: |
          curl -sf http://localhost:8055/ | grep -qi '<!doctype html' \
            && echo "✅ Frontend served" \
            || (echo "❌ Unexpected response from /"; exit 1)

      - name: ciaren info (resolve settings)
        run: |
          docker exec ciaren-ci ciaren info \
            && echo "✅ ciaren info succeeded"

      - name: ciaren check (validate environment)
        run: |
          docker exec ciaren-ci ciaren check \
            && echo "✅ ciaren check passed"

      - name: Show container logs on failure
        if: failure()
        run: docker logs ciaren-ci

      - name: Stop container
        if: always()
        run: docker stop ciaren-ci || true

  build-ml:
    name: Build with ML extras
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # ML build is slow (~1 GB of packages), so it's reserved for the moments that
    # actually ship or need the guarantee: release tags, the weekly schedule, and
    # manual dispatch. It intentionally does NOT run on PRs.
    if: github.ref_type == 'tag' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (EXTRAS=ml)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ciaren:ci-ml
          build-args: |
            EXTRAS=ml
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify XGBoost/LightGBM are importable
        run: |
          docker run --rm --entrypoint python ciaren:ci-ml -c \
            "import xgboost, lightgbm; print('✅ XGBoost/LightGBM available')"

      - name: ciaren check with ML extras
        run: |
          docker run --rm --entrypoint ciaren ciaren:ci-ml check \
            && echo "✅ ciaren check passed with ML extras"

  summary:
    name: Docker Summary
    runs-on: ubuntu-latest
    needs: [build]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Docker build or smoke-test failed"
            exit 1
          fi
          echo "✅ Docker image builds and passes smoke tests"
