name: Backend Full Test Suite

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/backend-tests-full.yml
  pull_request:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/backend-tests-full.yml
  schedule:
    # Run nightly to ensure all database combinations work
    - cron: "0 2 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-sqlite:
    name: SQLite | Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: latest

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-groups

      - name: Run linting
        working-directory: backend
        run: |
          uv run ruff check app tests --exclude migrations
          uv run mypy app

      - name: Run tests with coverage (SQLite)
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
        run: |
          uv run pytest tests \
            --cov=app \
            --cov-report=term-out \
            --cov-report=xml \
            --cov-fail-under=95 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: sqlite-py${{ matrix.python-version }}
          fail_ci_if_error: false

  test-postgresql:
    name: PostgreSQL | Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowframe_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: latest

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-groups

      - name: Run tests with coverage (PostgreSQL)
        working-directory: backend
        run: |
          uv run pytest tests \
            --cov=app \
            --cov-report=term-out \
            --cov-report=xml \
            --cov-fail-under=95 \
            -v
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/flowframe_test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: postgresql-py311
          fail_ci_if_error: false

  test-mysql:
    name: MySQL 8.0 | Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: flowframe_test
          MYSQL_USER: flowframe
          MYSQL_PASSWORD: flowframe
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: latest

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-groups && uv pip install aiomysql

      - name: Run tests with coverage (MySQL)
        working-directory: backend
        run: |
          uv run pytest tests \
            --cov=app \
            --cov-report=term-out \
            --cov-report=xml \
            --cov-fail-under=95 \
            -v
        env:
          DATABASE_URL: mysql+aiomysql://flowframe:flowframe@localhost:3306/flowframe_test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: mysql-py311
          fail_ci_if_error: false

  coverage-report:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [test-sqlite, test-postgresql, test-mysql]
    if: always()

    steps:
      - name: Check coverage requirements
        if: |
          needs.test-sqlite.result == 'failure' ||
          needs.test-postgresql.result == 'failure' ||
          needs.test-mysql.result == 'failure'
        run: |
          echo "❌ Some test suites failed"
          exit 1

      - name: Coverage check passed
        if: |
          needs.test-sqlite.result == 'success' &&
          needs.test-postgresql.result == 'success' &&
          needs.test-mysql.result == 'success'
        run: |
          echo "✅ All test suites passed with >95% coverage"
          echo "✅ Tested on SQLite, PostgreSQL, and MySQL"
          echo "✅ Tested on Python 3.11, 3.12, and 3.13"
