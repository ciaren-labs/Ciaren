name: Feature request
description: Propose a new capability or meaningful behavior change.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for concrete product or engineering proposals. For early brainstorming, usage questions, or "would this be useful?" conversations, please start in Discussions first.

        Ciaren's open core stays intentionally lightweight. Requests for niche databases, SaaS products, internal APIs, or proprietary storage systems should normally be built as plugins with the Plugin SDK. Please do not open a feature request asking maintainers to add a long-tail connector to core unless you are proposing a broadly useful core capability or an SDK gap that blocks plugin authors.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues, PRs, and docs for this request.
          required: true
        - label: This is a concrete feature request, not a support question.
          required: true
        - label: If this is about a new connector/integration, I considered the Plugin SDK path first.
          required: true
        - label: I am willing to clarify requirements or help test the feature.
          required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend/UI
        - Backend/API
        - Flow editor
        - Transformation engine
        - Data connectors/storage
        - Plugins/SDK
        - CLI/client
        - Documentation
        - Docker/deployment
        - CI/release tooling
        - Unsure
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Expected scope
      description: This helps maintainers route the request.
      options:
        - Small improvement
        - New option or setting
        - New transformation node
        - Plugin SDK gap
        - Broad core connector capability
        - Large architecture or product change
        - Unsure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Explain the workflow pain, user need, or missing capability.
      placeholder: "When I ..., I cannot ..., which means ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe how this should work from a user's point of view.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and workarounds
      description: Mention existing nodes, scripts, exports, plugins, or external tools that partially solve it.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples, references, or mockups
      description: Link similar tools, attach sketches, or provide sample input/output.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List what must be true for this to be considered done.
      placeholder: |
        - Users can ...
        - Invalid input shows ...
        - Docs include ...
