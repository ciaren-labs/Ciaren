name: Plugin SDK or connector issue
description: Report plugin SDK gaps, plugin documentation gaps, or bugs in existing connector/plugin behavior.
title: "plugin: "
labels: ["plugins", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Ciaren keeps the open core intentionally lightweight. Requests for a new database, SaaS, storage, or API integration are usually best handled as community plugins built with the Plugin SDK, not as new built-in core connectors.

        Use this issue form for SDK/API gaps, documentation gaps, bugs in existing connectors, or cases where the current Plugin SDK blocks you from building a connector yourself. For "please add connector X" ideas, start in Discussions and frame the proposal as a plugin.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues, PRs, docs, and existing plugin examples for this request.
          required: true
        - label: I understand new niche connectors/integrations are expected to live as plugins unless maintainers explicitly accept them into core.
          required: true
        - label: I checked whether this belongs in Discussions as a plugin design question.
          required: true
  - type: dropdown
    id: request_type
    attributes:
      label: Request type
      options:
        - Plugin SDK/API gap
        - Existing connector bug or compatibility issue
        - Connector plugin authoring question
        - Documentation gap
        - Existing plugin example issue
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Target SDK area, existing connector, or plugin example
      placeholder: "Example: ConnectorRuntime, REST API connector, MLP plugin example"
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Describe the workflow this enables and why the existing core connector or Plugin SDK cannot handle it.
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: Required SDK/core behavior
      placeholder: |
        - SDK method or schema field needed:
        - Existing behavior:
        - Expected behavior:
        - Why a plugin cannot implement this today:
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints, auth, and security notes
      description: Do not paste secrets. Mention local emulators, SDKs, rate limits, or compliance constraints.
  - type: textarea
    id: references
    attributes:
      label: References
      description: Link official API docs, SDKs, sample data, plugin prototypes, or similar implementations.
